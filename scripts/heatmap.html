<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Cal Heatmap -->
  <script src="https://cdn.jsdelivr.net/npm/cal-heatmap@4.2.4/dist/cal-heatmap.min.js"></script>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/cal-heatmap@4.2.4/dist/cal-heatmap.css"
  />

  <style>
    body {
      background-color: #0d1117;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h2 {
      color: #00b3ff;
      margin-bottom: 30px;
    }

    #cal-heatmap {
      width: 100%;
    }
  </style>
</head>

<body>

  <h2>AndySingal Contribution Heatmap</h2>

  <div id="cal-heatmap"></div>

  <script>
    const cal = new CalHeatmap();

    // Create sample data
    const data = {};

    const startDate = new Date("2025-01-01");

    for (let i = 0; i < 365; i++) {
      const date = new Date(startDate);

      date.setDate(startDate.getDate() + i);

      const timestamp = Math.floor(date.getTime() / 1000);

      data[timestamp] = Math.floor(Math.random() * 10);
    }

    cal.paint({
      itemSelector: "#cal-heatmap",

      domain: {
        type: "month",
        gutter: 8
      },

      subDomain: {
        type: "day",
        width: 14,
        height: 14,
        gutter: 3,
        radius: 2
      },

      range: 12,

      date: {
        start: new Date("2025-01-01")
      },

      data: {
        source: data,
        type: "json"
      },

      scale: {
        color: {
          type: "linear",
          range: ["#161b22", "#00b3ff"],
          domain: [0, 10]
        }
      }
    });
  </script>

</body>

</html>
