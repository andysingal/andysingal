<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Cal Heatmap -->
  <script src="https://cdn.jsdelivr.net/npm/cal-heatmap/dist/cal-heatmap.min.js"></script>

  <!-- Cal Heatmap CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/cal-heatmap/dist/cal-heatmap.css"
  />

  <style>
    body {
      background-color: #0d1117;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h2 {
      color: #00b3ff;
      margin-bottom: 30px;
    }

    #cal-heatmap {
      overflow-x: auto;
    }

    svg {
      background-color: #0d1117;
    }
  </style>
</head>

<body>

<h2>AndySingal Contribution Heatmap</h2>

<div id="cal-heatmap"></div>

<script>
  const cal = new CalHeatmap();

  // Generate fake data
  const data = [];

  const start = new Date("2025-01-01");

  for (let i = 0; i < 365; i++) {
    const date = new Date(start);

    date.setDate(start.getDate() + i);

    data.push({
      date: date.toISOString(),
      value: Math.floor(Math.random() * 10)
    });
  }

  cal.paint({
    itemSelector: "#cal-heatmap",

    range: 12,

    domain: {
      type: "month",
      gutter: 8,
    },

    subDomain: {
      type: "day",
      width: 14,
      height: 14,
      gutter: 2,
      radius: 2
    },

    date: {
      start: new Date("2025-01-01")
    },

    data: {
      source: data,
      x: "date",
      y: "value"
    },

    scale: {
      color: {
        type: "linear",
        range: ["#161b22", "#00b3ff"],
        domain: [0, 10]
      }
    }
  });
</script>

</body>
</html>
